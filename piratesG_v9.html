let selectedIndex = -1;
let currentData = [];

const TPB_BASE_URL = 'https://thepiratebay.org/description.php?id=';

// ======================== HELPERS ========================
function normalizeUnits(v) {
    return v.replace(/GiB/gi,'GB').replace(/MiB/gi,'MB').replace(/KiB/gi,'KB').replace(/TiB/gi,'TB').replace(/PiB/gi,'PB');
}
function parseSize(s) {
    const c = s.replace(/\s/g,'');
    const m = c.match(/^([\d.]+)(GB|MB|KB|TB|PB)$/i);
    if(!m) return 0;
    const n=parseFloat(m[1]), u=m[2].toUpperCase();
    switch(u){case'KB':return n/1024/1024;case'MB':return n/1024;case'GB':return n;case'TB':return n*1024;case'PB':return n*1024*1024;default:return n;}
}
function getSeedersClass(s){
    if(s===0)return'seeders-red';
    if(s<=10)return'seeders-orange';
    if(s<=30)return'seeders-blue';
    if(s<=70)return'seeders-purple';
    return'seeders-green';
}
function getPlatformCategory(p,n){
    if(n && n.includes('Wii U')) return 'wiiu';
    if(p.includes('XBOX360')||p.includes('Xbox')) return 'xbox';
    if(p.includes('PS3')||p.includes('PS4')||p.includes('PS5')||p.includes('PSx')) return 'playstation';
    if(p.includes('Wii')) return 'wii';
    if(p.includes('Android')) return 'android';
    if(p.includes('Windows')) return 'windows';
    if(p.includes('Linux')) return 'linux';
    if(p.includes('Mac')||p.includes('OS X')||p.includes('macOS')) return 'mac';
    return 'other';
}
function getPlatformInfo(p,n){
    let icon='fa-solid fa-desktop', css='platform-windows', short=p.replace('Games > ','');
    if(n && n.includes('Wii U')){ icon='fa-solid fa-gamepad'; css='platform-wiiu'; short='Wii U'; }
    else if(p.includes('XBOX360')||p.includes('Xbox')){ icon='fa-brands fa-xbox'; css='platform-xbox'; short='Xbox 360'; }
    else if(p.includes('PS3')||p.includes('PS4')||p.includes('PS5')||p.includes('PSx')){ icon='fa-brands fa-playstation'; css='platform-ps'; short=p.includes('PS3')?'PS3':p.includes('PS4')?'PS4':p.includes('PS5')?'PS5':'PS'; }
    else if(p.includes('Wii')){ icon='fa-solid fa-gamepad'; css='platform-wii'; short='Wii'; }
    else if(p.includes('Android')){ icon='fa-brands fa-android'; css='platform-android'; short='Android'; }
    else if(p.includes('Windows')){ icon='fa-brands fa-windows'; css='platform-windows'; short='Windows'; }
    else if(p.includes('Linux')){ icon='fa-brands fa-linux'; css='platform-linux'; short='Linux'; }
    else if(p.includes('Mac')||p.includes('OS X')||p.includes('macOS')){ icon='fa-brands fa-apple'; css='platform-mac'; short='Mac'; }
    else if(p.includes('Handheld')||p.includes('Other OS')||p.includes('Audio')||p.includes('Other')){ icon='fa-solid fa-handheld'; css='platform-other'; short='Other'; }
    return {icon,css,short};
}
function isFavorite(id){ return favorites.includes(id); }
function toggleFavorite(id){
    const idx=favorites.indexOf(id);
    if(idx>-1) favorites.splice(idx,1); else favorites.push(id);
    localStorage.setItem('piratesG_favorites', JSON.stringify(favorites));
    applyFilters();
}

// ======================== SORT ========================
function sortBy(field){
    if(sortField===field) sortAscending=!sortAscending;
    else { sortField=field; sortAscending=true; }
    document.querySelectorAll('th .sort-indicator').forEach(el=>{ el.textContent='↕'; el.parentElement.classList.remove('active-sort'); });
    const h=document.getElementById(`sort-${field}`);
    if(h){ h.classList.add('active-sort'); const ind=h.querySelector('.sort-indicator'); if(ind) ind.textContent=sortAscending?'↑':'↓'; }
    applyFilters();
}
function sortData(data){
    return [...data].sort((a,b)=>{
        let va,vb;
        switch(sortField){
            case'id': va=a.id; vb=b.id; break;
            case'name': va=a.name.toLowerCase(); vb=b.name.toLowerCase(); break;
            case'size': va=parseSize(normalizeUnits(a.size)); vb=parseSize(normalizeUnits(b.size)); break;
            case'uploader': va=a.uploader.toLowerCase(); vb=b.uploader.toLowerCase(); break;
            case'upload_date': va=new Date(a.upload_date); vb=new Date(b.upload_date); break;
            case'seeders': va=a.seeders; vb=b.seeders; break;
            case'hash': va=a.hash.toLowerCase(); vb=b.hash.toLowerCase(); break;
            case'platform': va=a.platform.toLowerCase(); vb=b.platform.toLowerCase(); break;
            default: va=a.id; vb=b.id;
        }
        if(va<vb) return sortAscending?-1:1;
        if(va>vb) return sortAscending?1:-1;
        return 0;
    });
}

// ======================== FILTER / RENDER ========================
function getFilteredData(){
    let data = torrentData;
    if(searchQuery){
        const q=searchQuery.toLowerCase();
        data = data.filter(t=> t.name.toLowerCase().includes(q)||t.uploader.toLowerCase().includes(q)||t.platform.toLowerCase().includes(q)||t.id.toString().includes(q)||t.hash.toLowerCase().includes(q));
    }
    if(currentFilter!=='all') data = data.filter(t=> getPlatformCategory(t.platform,t.name)===currentFilter);
    if(showFavorites) data = data.filter(t=> favorites.includes(t.id));
    return sortData(data);
}
function renderTable(data){
    const tbody=document.getElementById('torrentTableBody');
    tbody.innerHTML='';
    if(data.length===0){ tbody.innerHTML=`<tr><td colspan="10" class="no-results">🔍 No torrents found</td></tr>`; return; }
    data.forEach((torrent,index)=>{
        const tr=document.createElement('tr');
        tr.dataset.index=index;
        const fav=isFavorite(torrent.id);
        if(fav) tr.classList.add('favorite');
        const sc=getSeedersClass(torrent.seeders);
        const pi=getPlatformInfo(torrent.platform, torrent.name);
        const ns=normalizeUnits(torrent.size);
        tr.innerHTML=`
            <td><button class="fav-btn ${fav?'active':''}" onclick="toggleFavorite(${torrent.id})" title="${fav?'Remove':'Add'} favorite">${fav?'⭐':'☆'}</button></td>
            <td class="id-cell">${torrent.id}</td>
            <td class="name-cell">${torrent.name}</td>
            <td>${ns}</td>
            <td>${torrent.uploader}</td>
            <td>${torrent.upload_date||'N/A'}</td>
            <td><span class="seeders-badge ${sc}">${torrent.seeders}</span></td>
            <td class="hash-cell" title="Click to copy hash" onclick="copyHash('${torrent.hash}')">${torrent.hash.substring(0,8)}...</td>
            <td><div class="platform-cell ${pi.css}"><i class="${pi.icon} platform-icon"></i><span class="platform-text">${pi.short}</span></div></td>
            <td><div class="actions-cell">
                <a href="${TPB_BASE_URL}${torrent.id}" class="tpb-btn" target="_blank" title="TPB"><i class="fa-solid fa-skull-crossbones icon"></i></a>
                <a href="${torrent.magnet_link}" class="magnet-link" title="Copy Magnet" onclick="copyMagnet(event,'${torrent.magnet_link}')">🧲</a>
            </div></td>
        `;
        tbody.appendChild(tr);
    });
    selectedIndex=-1;
    currentData=data;
}
function updateCounts(){
    const counts={all:torrentData.length,xbox:0,playstation:0,wii:0,wiiu:0,windows:0,linux:0,mac:0,android:0,other:0,favorites:favorites.length};
    torrentData.forEach(t=>{ const cat=getPlatformCategory(t.platform,t.name); if(cat in counts) counts[cat]++; });
    Object.keys(counts).forEach(k=>{ const el=document.getElementById(`count-${k}`); if(el) el.textContent=counts[k]; });
}
function updateStats(data){
    const total=data.length;
    const uploaders=new Set(data.map(t=>t.uploader)).size;
    const seeders=data.reduce((s,t)=>s+t.seeders,0);
    let sizeGB=0;
    data.forEach(t=>{ const ns=normalizeUnits(t.size); if(ns.includes('GB')) sizeGB+=parseFloat(ns); else if(ns.includes('MB')) sizeGB+=parseFloat(ns)/1024; else if(ns.includes('KB')) sizeGB+=parseFloat(ns)/1024/1024; });
    document.getElementById('totalCount').textContent=total;
    document.getElementById('uniqueUploaders').textContent=uploaders;
    document.getElementById('totalSize').textContent=sizeGB.toFixed(2)+' GB';
    document.getElementById('totalSeeders').textContent=seeders;
    document.getElementById('favCount').textContent=favorites.length;
}
function applyFilters(){
    const data=getFilteredData();
    renderTable(data);
    updateStats(data);
    updateCounts();
    selectedIndex=-1;
}

// ======================== FILTER UI ========================
function setFilter(p){ currentFilter=p; document.querySelectorAll('.filter-item').forEach(b=>{ b.classList.toggle('active', b.dataset.platform===p); }); if(showFavorites){ showFavorites=false; document.getElementById('favFilterBtn').classList.remove('active'); } applyFilters(); }
function toggleFavFilter(){ showFavorites=!showFavorites; document.getElementById('favFilterBtn').classList.toggle('active',showFavorites); if(showFavorites){ document.querySelectorAll('.filter-item').forEach(b=>b.classList.remove('active')); currentFilter='all'; } applyFilters(); }

// ======================== SEARCH ========================
document.getElementById('searchInput').addEventListener('input', function(){ searchQuery=this.value; applyFilters(); });

// ======================== COPY ========================
function copyHash(hash){
    const el=event.target;
    const orig=el.textContent;
    const inp=document.createElement('input'); inp.value=hash; document.body.appendChild(inp); inp.select();
    try{ document.execCommand('copy'); el.textContent='📋 Copied!'; el.style.color='#00d4ff'; el.style.fontWeight='bold'; setTimeout(()=>{ el.textContent=orig; el.style.color='#8899bb'; el.style.fontWeight='normal'; },2000); }catch(e){ el.textContent='❌ Failed!'; setTimeout(()=>{ el.textContent=orig; },1500); }
    document.body.removeChild(inp);
}
function copyMagnet(e,link){ e.preventDefault(); navigator.clipboard.writeText(link).then(()=>{ const el=e.target; const orig=el.textContent; el.textContent='✅'; setTimeout(()=>{ el.textContent=orig; },2000); }); }

// ======================== KEYBOARD ========================
document.addEventListener('keydown', function(e){
    const rows = document.querySelectorAll('#torrentTableBody tr');
    const searchInput = document.getElementById('searchInput');
    const isSearchFocused = document.activeElement === searchInput;
    if(rows.length===0){ if(e.key==='Escape' && isSearchFocused){ e.preventDefault(); searchInput.blur(); selectedIndex=-1; } return; }
    if(e.key==='Escape'){ e.preventDefault(); if(isSearchFocused){ searchInput.blur(); selectedIndex=0; updateSelection(rows); }else{ searchInput.focus(); rows.forEach(r=>r.classList.remove('selected')); } return; }
    if(e.key==='ArrowDown'){ e.preventDefault(); if(isSearchFocused) searchInput.blur(); if(selectedIndex<rows.length-1) selectedIndex++; else selectedIndex=0; updateSelection(rows); return; }
    if(e.key==='ArrowUp'){ e.preventDefault(); if(isSearchFocused) searchInput.blur(); if(selectedIndex>0) selectedIndex--; else selectedIndex=rows.length-1; updateSelection(rows); return; }
    if(e.key==='Enter' && !isSearchFocused){ e.preventDefault(); if(selectedIndex>=0 && selectedIndex<rows.length){ const row=rows[selectedIndex]; const idCell=row.querySelector('.id-cell'); if(idCell){ const id=parseInt(idCell.textContent); const tor=currentData.find(t=>t.id===id); if(tor) window.open(TPB_BASE_URL+tor.id,'_blank'); } } return; }
    if(e.key===' ' && !isSearchFocused){ e.preventDefault(); if(selectedIndex>=0 && selectedIndex<rows.length){ const row=rows[selectedIndex]; const ml=row.querySelector('.magnet-link'); if(ml){ const href=ml.getAttribute('href'); if(href){ navigator.clipboard.writeText(href).then(()=>{ const orig=ml.textContent; ml.textContent='✅'; setTimeout(()=>{ ml.textContent=orig; },2000); }); } } } return; }
    if((e.key==='f'||e.key==='F') && !isSearchFocused){ e.preventDefault(); if(selectedIndex>=0 && selectedIndex<rows.length){ const row=rows[selectedIndex]; const btn=row.querySelector('.fav-btn'); if(btn) btn.click(); } return; }
    if(e.key==='/'){ e.preventDefault(); searchInput.focus(); rows.forEach(r=>r.classList.remove('selected')); return; }
});
function updateSelection(rows){ rows.forEach(r=>r.classList.remove('selected')); if(selectedIndex>=0 && selectedIndex<rows.length){ rows[selectedIndex].classList.add('selected'); rows[selectedIndex].scrollIntoView({block:'nearest'}); } }

// ======================== IMPORT / EXPORT ========================
function exportData(){
    const payload = { torrents: torrentData, favorites: favorites };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `piratesG_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setStatus('✅ Exported');
}
function importData(file){
    const reader = new FileReader();
    reader.onload = function(e){
        try{
            const parsed = JSON.parse(e.target.result);
            if(!parsed.torrents || !Array.isArray(parsed.torrents)) throw new Error('Invalid format: missing torrents array');
            torrentData = parsed.torrents;
            if(parsed.favorites && Array.isArray(parsed.favorites)){
                favorites = parsed.favorites;
                localStorage.setItem('piratesG_favorites', JSON.stringify(favorites));
            } else {
                favorites = [];
                localStorage.setItem('piratesG_favorites', JSON.stringify(favorites));
            }
            setStatus('✅ Imported: ' + torrentData.length + ' torrents');
            applyFilters();
        }catch(err){
            setStatus('❌ Import failed: ' + err.message);
        }
    };
    reader.readAsText(file);
}

function setStatus(msg){ document.getElementById('ioStatus').textContent = msg; }

// ======================== BIND UI ========================
document.getElementById('exportBtn').addEventListener('click', exportData);
document.getElementById('importFile').addEventListener('change', function(e){
    if(this.files && this.files[0]) importData(this.files[0]);
    this.value = ''; // reset
});


// ======================== INIT ========================
document.getElementById('sort-name').classList.add('active-sort');
document.getElementById('sort-name').querySelector('.sort-indicator').textContent = '↑';
document.querySelector('.filter-item[data-platform="all"]').classList.add('active');
applyFilters();
</script>
</body>
