        // ======================== NORMALIZE UNITS FUNCTION ========================
        function normalizeUnits(valueWithUnit) {
            return valueWithUnit
                .replace(/GiB/gi, "GB")
                .replace(/MiB/gi, "MB")
                .replace(/KiB/gi, "KB")
                .replace(/TiB/gi, "TB")
                .replace(/PiB/gi, "PB");
        }

        // ======================== STATE ========================
        const TPB_BASE_URL = 'https://thepiratebay.org/description.php?id=';
        let favorites = JSON.parse(localStorage.getItem('piratesG_favorites') || '[]');
        let currentFilter = 'all';
        let showFavorites = false;
        let searchQuery = '';
        let sortField = 'name';
        let sortAscending = true;

        // ======================== SORT FUNCTIONS ========================

        function sortBy(field) {
            if (sortField === field) {
                sortAscending = !sortAscending;
            } else {
                sortField = field;
                sortAscending = true;
            }
            
            document.querySelectorAll('th .sort-indicator').forEach(el => {
                el.textContent = '↕';
                el.parentElement.classList.remove('active-sort');
            });
            const header = document.getElementById(`sort-${field}`);
            if (header) {
                header.classList.add('active-sort');
                const indicator = header.querySelector('.sort-indicator');
                if (indicator) {
                    indicator.textContent = sortAscending ? '↑' : '↓';
                }
            }
            
            applyFilters();
        }

        function sortData(data) {
            return [...data].sort((a, b) => {
                let valA, valB;
                
                switch(sortField) {
                    case 'id':
                        valA = a.id;
                        valB = b.id;
                        break;
                    case 'name':
                        valA = a.name.toLowerCase();
                        valB = b.name.toLowerCase();
                        break;
                    case 'size':
                        valA = parseSize(normalizeUnits(a.size));
                        valB = parseSize(normalizeUnits(b.size));
                        break;
                    case 'uploader':
                        valA = a.uploader.toLowerCase();
                        valB = b.uploader.toLowerCase();
                        break;
                    case 'upload_date':
                        valA = new Date(a.upload_date);
                        valB = new Date(b.upload_date);
                        break;
                    case 'seeders':
                        valA = a.seeders;
                        valB = b.seeders;
                        break;
                    case 'hash':
                        valA = a.hash.toLowerCase();
                        valB = b.hash.toLowerCase();
                        break;
                    case 'platform':
                        valA = a.platform.toLowerCase();
                        valB = b.platform.toLowerCase();
                        break;
                    default:
                        valA = a.id;
                        valB = b.id;
                }
                
                if (valA < valB) return sortAscending ? -1 : 1;
                if (valA > valB) return sortAscending ? 1 : -1;
                return 0;
            });
        }

        function parseSize(sizeStr) {
            const cleaned = sizeStr.replace(/\s/g, '');
            const match = cleaned.match(/^([\d.]+)(GB|MB|KB|TB|PB)$/i);
            if (!match) return 0;
            const num = parseFloat(match[1]);
            const unit = match[2].toUpperCase();
            switch(unit) {
                case 'KB': return num / 1024 / 1024;
                case 'MB': return num / 1024;
                case 'GB': return num;
                case 'TB': return num * 1024;
                case 'PB': return num * 1024 * 1024;
                default: return num;
            }
        }

        // ======================== HELPER FUNCTIONS ========================

        function getPlatformCategory(platform, name) {
            if (name && name.includes('Wii U')) return 'wiiu';
            if (platform.includes('XBOX360') || platform.includes('Xbox')) return 'xbox';
            if (platform.includes('PS3') || platform.includes('PS4') || platform.includes('PS5') || platform.includes('PSx')) return 'playstation';
            if (platform.includes('Wii')) return 'wii';
            if (platform.includes('Android')) return 'android';
            if (platform.includes('PC')) return 'pc';
            return 'other';
        }

        function getPlatformInfo(platform, name) {
            let icon = 'fa-solid fa-desktop';
            let cssClass = 'platform-pc';
            let shortName = platform.replace('Games > ', '');

            if (name && name.includes('Wii U')) {
                icon = 'fa-solid fa-gamepad';
                cssClass = 'platform-wiiu';
                shortName = 'Wii U';
            } else if (platform.includes('XBOX360') || platform.includes('Xbox')) {
                icon = 'fa-brands fa-xbox';
                cssClass = 'platform-xbox';
                shortName = 'Xbox 360';
            } else if (platform.includes('PS3') || platform.includes('PS4') || platform.includes('PS5') || platform.includes('PSx')) {
                icon = 'fa-brands fa-playstation';
                cssClass = 'platform-ps';
                shortName = platform.includes('PS3') ? 'PS3' : 
                           platform.includes('PS4') ? 'PS4' : 
                           platform.includes('PS5') ? 'PS5' : 'PS';
            } else if (platform.includes('Wii')) {
                icon = 'fa-solid fa-gamepad';
                cssClass = 'platform-wii';
                shortName = 'Wii';
            } else if (platform.includes('Android')) {
                icon = 'fa-brands fa-android';
                cssClass = 'platform-android';
                shortName = 'Android';
            } else if (platform.includes('Handheld') || platform.includes('Other OS') || platform.includes('Audio')) {
                icon = 'fa-solid fa-handheld';
                cssClass = 'platform-other';
                shortName = 'Other';
            } else if (platform.includes('PC')) {
                icon = 'fa-solid fa-desktop';
                cssClass = 'platform-pc';
                shortName = 'PC';
            }

            return { icon, cssClass, shortName };
        }

        function isFavorite(id) {
            return favorites.includes(id);
        }

        function toggleFavorite(id) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('piratesG_favorites', JSON.stringify(favorites));
            applyFilters();
        }

        // ======================== FILTERS ========================

        function setFilter(platform) {
            currentFilter = platform;
            document.querySelectorAll('.filter-item').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.platform === platform);
            });
            if (showFavorites) {
                showFavorites = false;
                document.getElementById('favFilterBtn').classList.remove('active');
            }
            applyFilters();
        }

        function toggleFavFilter() {
            showFavorites = !showFavorites;
            document.getElementById('favFilterBtn').classList.toggle('active', showFavorites);
            if (showFavorites) {
                document.querySelectorAll('.filter-item').forEach(btn => btn.classList.remove('active'));
                currentFilter = 'all';
            }
            applyFilters();
        }

        // ======================== RENDER ========================

        function getFilteredData() {
            let data = torrentData;

            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                data = data.filter(t => 
                    t.name.toLowerCase().includes(query) ||
                    t.uploader.toLowerCase().includes(query) ||
                    t.platform.toLowerCase().includes(query) ||
                    t.id.toString().includes(query) ||
                    t.hash.toLowerCase().includes(query)
                );
            }

            if (currentFilter !== 'all') {
                data = data.filter(t => getPlatformCategory(t.platform, t.name) === currentFilter);
            }

            if (showFavorites) {
                data = data.filter(t => favorites.includes(t.id));
            }

            data = sortData(data);

            return data;
        }

        function renderTable(data) {
            const tbody = document.getElementById('torrentTableBody');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="no-results">🔍 No torrents found matching your filters</td></tr>`;
                return;
            }

            data.forEach(torrent => {
                const tr = document.createElement('tr');
                const fav = isFavorite(torrent.id);
                if (fav) tr.classList.add('favorite');
                
                let seedersClass = 'seeders-low';
                if (torrent.seeders >= 50) seedersClass = 'seeders-high';
                else if (torrent.seeders >= 10) seedersClass = 'seeders-medium';

                const platformInfo = getPlatformInfo(torrent.platform, torrent.name);
                const normalizedSize = normalizeUnits(torrent.size);
                
                tr.innerHTML = `
                    <td>
                        <button class="fav-btn ${fav ? 'active' : ''}" onclick="toggleFavorite(${torrent.id})" title="${fav ? 'Remove from favorites' : 'Add to favorites'}">
                            ${fav ? '⭐' : '☆'}
                        </button>
                    </td>
                    <td class="id-cell">${torrent.id}</td>
                    <td class="name-cell">${torrent.name}</td>
                    <td>${normalizedSize}</td>
                    <td>${torrent.uploader}</td>

                    <td class="hash-cell" title="Click to copy hash" onclick="copyHash('${torrent.hash}')">${torrent.hash.substring(0, 8)}...</td>
                    <td>
                        <div class="platform-cell ${platformInfo.cssClass}">
                            <i class="${platformInfo.icon} platform-icon" aria-hidden="true"></i>
                            <span class="platform-text">${platformInfo.shortName}</span>
                        </div>
                    </td>
                    <td>
                        <div class="actions-cell">
                            <a href="${TPB_BASE_URL}${torrent.id}" class="tpb-btn" target="_blank" title="View on The Pirate Bay">
                                <i class="fa-solid fa-skull-crossbones icon"></i>
                            </a>
                            <a href="${torrent.magnet_link}" class="magnet-link" title="Copy Magnet Link" onclick="copyMagnet(event, '${torrent.magnet_link}')">🧲</a>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function copyHash(hash) {
            const el = event.target;
            const originalText = el.textContent;
            
            const tempInput = document.createElement('input');
            tempInput.value = hash;
            document.body.appendChild(tempInput);
            tempInput.select();
            tempInput.setSelectionRange(0, 99999);
            
            try {
                document.execCommand('copy');
                el.textContent = '📋 Copied!';
                el.style.color = '#00d4ff';
                el.style.fontWeight = 'bold';
                setTimeout(() => {
                    el.textContent = originalText;
                    el.style.color = '#8899bb';
                    el.style.fontWeight = 'normal';
                }, 2000);
            } catch (err) {
                el.textContent = '❌ Failed!';
                setTimeout(() => {
                    el.textContent = originalText;
                }, 1500);
            }
            
            document.body.removeChild(tempInput);
        }

        function copyMagnet(event, magnetLink) {
            event.preventDefault();
            navigator.clipboard.writeText(magnetLink).then(() => {
                const el = event.target;
                const originalText = el.textContent;
                el.textContent = '✅';
                setTimeout(() => {
                    el.textContent = originalText;
                }, 2000);
            });
        }

        function updateCounts() {
            const counts = {
                all: torrentData.length,
                xbox: 0,
                playstation: 0,
                wii: 0,
                wiiu: 0,
                pc: 0,
                android: 0,
                other: 0,
                favorites: favorites.length
            };

            torrentData.forEach(t => {
                const cat = getPlatformCategory(t.platform, t.name);
                if (cat in counts) counts[cat]++;
            });

            Object.keys(counts).forEach(key => {
                const el = document.getElementById(`count-${key}`);
                if (el) el.textContent = counts[key];
            });
        }

        function updateStats(data) {
            const total = data.length;
            const uniqueUploaders = new Set(data.map(t => t.uploader)).size;
            const totalSeeders = data.reduce((sum, t) => sum + t.seeders, 0);
            
            let totalSizeGB = 0;
            data.forEach(t => {
                const normalized = normalizeUnits(t.size);
                if (normalized.includes('GB')) {
                    totalSizeGB += parseFloat(normalized);
                } else if (normalized.includes('MB')) {
                    totalSizeGB += parseFloat(normalized) / 1024;
                } else if (normalized.includes('KB')) {
                    totalSizeGB += parseFloat(normalized) / 1024 / 1024;
                }
            });
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('uniqueUploaders').textContent = uniqueUploaders;
            document.getElementById('totalSize').textContent = totalSizeGB.toFixed(2) + ' GB';
            document.getElementById('totalSeeders').textContent = totalSeeders;
            document.getElementById('favCount').textContent = favorites.length;
        }

        function applyFilters() {
            const data = getFilteredData();
            renderTable(data);
            updateStats(data);
            updateCounts();
        }

        // ======================== SEARCH ========================

        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value;
            applyFilters();
        });

        // ======================== INIT ========================

        document.getElementById('sort-name').classList.add('active-sort');
        document.getElementById('sort-name').querySelector('.sort-indicator').textContent = '↑';
        document.querySelector('.filter-item[data-platform="all"]').classList.add('active');
        applyFilters();
    </script>
</body>
</html>
